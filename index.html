<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRKT</title>
    <link rel="icon" type="image/png" href="BRKT.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #111;
            padding: 10px 16px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* Header Custom Styling */
        header {
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5px 25px 5px;
        }
        
        .logo {
            font-family: system-ui, "Fredoka One", "Comic Sans MS", cursive, sans-serif;
            font-size: 38px; 
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #000000;
            text-align: center;
            cursor: pointer;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.04);
            user-select: none;
        }

        @media (min-width: 480px) {
            .logo {
                font-size: 48px;
            }
        }
        
        .icons {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000000;
            position: relative;
            padding: 6px;
        }

        .icon-btn svg {
            width: 26px;
            height: 26px;
            stroke: #000000;
            stroke-width: 1.35; 
            fill: none;
        }

        .cart-count {
            position: absolute;
            top: -2px;
            right: -4px;
            background: #000;
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            display: none; 
        }

        /* View Router Management */
        .view-section {
            display: none;
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
            flex: 1;
        }
        .view-section.active {
            display: block;
        }

        /* Responsive Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: minmax(min-content, max-content);
            gap: 14px;
            padding-top: 5px;
            padding-bottom: 60px;
        }

        @media (max-width: 380px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
        
        .card {
            background: #ffffff;
            border: 1px solid #eaeaea;
            border-radius: 18px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        @media (min-width: 480px) {
            .card {
                border-radius: 20px;
                padding: 24px;
            }
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }
        
        /* Fixed Aspect Ratio Container */
        .image-container {
            width: 100%;
            aspect-ratio: 3 / 4; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            padding: 0; 
            flex-shrink: 0;
        }

        @media (min-width: 480px) {
            .image-container {
                margin-bottom: 22px;
            }
        }
        
        .bg-lime   { background-color: #f9fbf9; }
        .bg-blue   { background-color: #f7faff; }
        .bg-pink   { background-color: #fff8f9; }
        .bg-orange { background-color: #fffbf5; }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            object-position: center;
            border-radius: 12px;
            display: block;
        }
        
        .info {
            width: 100%;
            text-align: left;
            padding-left: 2px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            position: relative;
        }
        
        .title {
            font-size: 14px;
            color: #222;
            font-weight: 500;
            margin-bottom: 6px;
            letter-spacing: 0.1px;
            line-height: 1.3;
            padding-right: 36px;
        }

        @media (min-width: 480px) {
            .title {
                font-size: 16px;
                padding-right: 44px;
            }
        }
        
        .price {
            font-size: 15px;
            font-weight: 600;
            color: #000;
            margin-top: auto; 
        }

        @media (min-width: 480px) {
            .price {
                font-size: 17px;
            }
        }

        /* Direct Add To Cart Circular Button on Grid Cards */
        .grid-add-btn {
            position: absolute;
            bottom: -2px;
            right: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #000000;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }

        .grid-add-btn:hover {
            background: #333333;
            transform: scale(1.08);
        }

        .grid-add-btn:active {
            transform: scale(0.95);
        }

        .grid-add-btn svg {
            width: 14px;
            height: 14px;
            fill: #ffffff;
        }

        @media (min-width: 480px) {
            .grid-add-btn {
                width: 40px;
                height: 40px;
                bottom: -4px;
            }
            .grid-add-btn svg {
                width: 16px;
                height: 16px;
            }
        }

        /* Dedicated Product Page Layout */
        .product-page-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding-bottom: 60px;
        }

        @media (min-width: 650px) {
            .product-page-container {
                flex-direction: row;
                align-items: flex-start;
                gap: 40px;
                padding-top: 20px;
            }
            .product-page-container .image-container {
                flex: 1;
                max-width: 450px;
                margin-bottom: 0;
            }
            .product-page-container .details-panel {
                flex: 1;
            }
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            padding: 4px 0;
        }

        .back-btn:hover {
            color: #000;
        }

        .detail-title {
            font-size: 24px;
            font-weight: 600;
            color: #111;
            margin-bottom: 10px;
        }

        .detail-price {
            font-size: 20px;
            font-weight: 600;
            color: #000;
            margin-bottom: 20px;
        }

        .detail-desc {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }

        .add-btn {
            width: 100%;
            max-width: 300px;
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background: #333333;
        }

        /* Footer System */
        footer {
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 10px 30px 10px;
            border-top: 1px solid #f2f2f2;
            text-align: center;
            font-size: 13px;
            color: #666666;
            line-height: 1.8;
        }

        .footer-links {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px 12px;
        }

        .footer-links a {
            color: #666666;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #000000;
        }

        .footer-dot {
            color: #cccccc;
            user-select: none;
        }

        /* Slide-out Cart Drawer */
        .cart-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: #ffffff;
            box-shadow: -5px 0 25px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .cart-drawer.open {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .close-drawer {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f9f9f9;
        }

        .item-details h4 {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .item-details p {
            font-size: 13px;
            color: #666;
        }

        .remove-item {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 12px;
            cursor: pointer;
            padding: 4px;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid #eee;
            background: #fafafa;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* Order button container styling */
        .telegram-link-wrapper {
            display: none; /* Controlled dynamically by JavaScript */
            text-decoration: none;
            width: 100%;
        }

        .telegram-btn {
            width: 100%;
            background: #24A1DE; 
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        .telegram-btn:hover {
            background: #1e87bb;
        }

        .telegram-btn:active {
            transform: scale(0.98);
        }

        .telegram-btn svg {
            width: 18px;
            height: 18px;
            fill: #ffffff;
        }

        .overlay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 999;
            display: none;
        }

        .overlay-bg.open {
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <button class="icon-btn" id="searchBtn" aria-label="Search">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7.5"></circle>
                <line x1="21" y1="21" x2="16.3" y2="16.3"></line>
            </svg>
        </button>
        
        <div class="logo" id="logoHome">BRKT</div>
        
        <div class="icons">
            <button class="icon-btn" id="profileBtn" aria-label="Profile">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="7" r="4"></circle>
                    <path d="M4.5 21a7.5 7.5 0 0 1 15 0"></path>
                </svg>
            </button>
            
            <button class="icon-btn" id="cartBtn" aria-label="Cart">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 8h14l1 12H4L5 8z"></path>
                    <path d="M9 8V5a3 3 0 0 1 6 0v3"></path>
                </svg>
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <main class="view-section active" id="catalogView">
        <div class="grid" id="productGrid"></div>
    </main>

    <section class="view-section" id="detailsView">
        <button class="back-btn" id="backToShopBtn">← Back to Shop</button>
        <div class="product-page-container" id="productPageContent"></div>
    </section>

    <footer>
        <div>© 2026, BRKTshop <span class="footer-dot">·</span></div>
        <div class="footer-links">
            <a href="#" onclick="alert('Privacy policy summary.')">Privacy policy</a>
            <span class="footer-dot">·</span>
            <a href="#" onclick="alert('Terms of service summary.')">Terms of service</a>
            <span class="footer-dot">·</span>
            <a href="#" onclick="alert('Shipping policy summary.')">Shipping policy</a>
            <span class="footer-dot">·</span>
            <a href="#" onclick="alert('Contact details modal.')">Contact information</a>
        </div>
    </footer>

    <div class="overlay-bg" id="overlay"></div>

    <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-drawer" id="closeCart">&times;</button>
        </div>
        <div class="cart-items" id="cartItemsList">
            <p style="color: #777; text-align: center; margin-top: 40px;" id="emptyMessage">Your cart is empty</p>
        </div>
        
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotalSum">Br0.00 ETB</span>
            </div>
            
            <!-- FIXED: Direct Anchor element with stylized inner div to prevent reloads -->
            <a href="#" target="_blank" class="telegram-link-wrapper" id="telegramLink">
                <div class="telegram-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.95 1.23-5.51 3.63-.52.36-.99.53-1.41.52-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.88.03-.24.37-.48 1.03-.74 4.04-1.76 6.74-2.92 8.1-3.48 3.84-1.6 4.64-1.88 5.16-1.89.11 0 .37.03.54.17.14.12.18.28.2.45-.02.07-.02.13-.03.19z"/>
                    </svg>
                    Order on Telegram
                </div>
            </a>
        </div>
    </div>

    <script>
        // CONFIG: Your shop's actual Telegram username
        const TELEGRAM_USERNAME = "BarkotR"; 

        // Data Store Setup
        const products = [
            {
                id: "1",
                name: " Baccarat Rouge 540 ",
                price: 950,
                bgClass: "bg-lime",
                imgSrc: "bakarat.png",
                desc: "Experience a fragrance that blends elegance with lasting sophistication. Baccarat Rouge 540 opens with luminous saffron and jasmine, leading into warm amberwood and ambergris before settling into a rich cedar and resinous finish."
            },
            {
                id: "2",
                name: "Qaed Al Fursan ",
                price: 950,
                bgClass: "bg-blue",
                imgSrc: "Qaed.png",
                desc: "Discover a bold fragrance that perfectly balances juicy tropical fruit with rich woody accords. Qaed Al Fursan opens with vibrant pineapple before revealing warm spices and settling into a smooth blend of oud, amber, cedarwood, and musk."
            },
            {
                id: "3",
                name: "Rave Now ",
                price: 950,
                bgClass: "bg-pink",
                imgSrc: "now.png",
                desc: "Make a lasting impression with Rave Now, a vibrant fragrance that blends juicy pineapple with warm woody notes for a bold and confident scent."
            },
            {
                id: "4",
                name: "Stronger With You ",
                price: 950,
                bgClass: "bg-orange",
                imgSrc: "swy.png",
                desc: "Warm, sweet, and irresistibly masculine. Stronger With You Intensely opens with spicy pink pepper and cardamom, blends into rich toffee and cinnamon, and finishes with smooth vanilla, amber, and tonka bean."
            }
        ];

        let cart = [];

        // UI Target Elements
        const catalogView = document.getElementById('catalogView');
        const detailsView = document.getElementById('detailsView');
        const productGrid = document.getElementById('productGrid');
        const productPageContent = document.getElementById('productPageContent');
        
        const cartDrawer = document.getElementById('cartDrawer');
        const cartBtn = document.getElementById('cartBtn');
        const closeCart = document.getElementById('closeCart');
        const overlay = document.getElementById('overlay');
        const cartCountBadge = document.getElementById('cartCount');
        const cartItemsList = document.getElementById('cartItemsList');
        const cartTotalSum = document.getElementById('cartTotalSum');
        const emptyMessage = document.getElementById('emptyMessage');
        const telegramLink = document.getElementById('telegramLink');

        // Draw Catalog Grid dynamically
        function renderCatalog() {
            productGrid.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="image-container ${product.bgClass}">
                        <img src="${product.imgSrc}" alt="${product.name}" class="product-image" onerror="this.style.display='none'">
                    </div>
                    <div class="info">
                        <div class="title">${product.name}</div>
                        <div class="price">Br${product.price.toLocaleString()}.00 ETB</div>
                        <button class="grid-add-btn" aria-label="Add to cart" data-id="${product.id}" data-name="${product.name}" data-price="${product.price}">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="#ffffff"/>
                            </svg>
                        </button>
                    </div>
                `;
                
                // Card click navigation
                card.addEventListener('click', () => showProductDetails(product.id));

                // Cart quick-add click handler
                const addBtn = card.querySelector('.grid-add-btn');
                addBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = addBtn.getAttribute('data-id');
                    const name = addBtn.getAttribute('data-name');
                    const price = parseFloat(addBtn.getAttribute('data-price'));
                    addToCartArray(id, name, price);
                });

                productGrid.appendChild(card);
            });
        }

        // Display Detailed Page View
        function showProductDetails(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            productPageContent.innerHTML = `
                <div class="image-container ${product.bgClass}">
                    <img src="${product.imgSrc}" alt="${product.name}" class="product-image" onerror="this.style.display='none'">
                </div>
                <div class="details-panel">
                    <h1 class="detail-title">${product.name}</h1>
                    <div class="detail-price">Br${product.price.toLocaleString()}.00 ETB</div>
                    <p class="detail-desc">${product.desc}</p>
                    <button class="add-btn" onclick="addToCartArray('${product.id}', '${product.name}', ${product.price})">Add to Cart</button>
                </div>
            `;

            catalogView.classList.remove('active');
            detailsView.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // View Routing Controls
        function showCatalogView() {
            detailsView.classList.remove('active');
            catalogView.classList.add('active');
        }

        document.getElementById('backToShopBtn').addEventListener('click', showCatalogView);
        document.getElementById('logoHome').addEventListener('click', showCatalogView);

        // Drawer Controls
        function openCartDrawer() {
            cartDrawer.classList.add('open');
            overlay.classList.add('open');
        }

        function closeCartDrawer() {
            cartDrawer.classList.remove('open');
            overlay.classList.remove('open');
        }

        cartBtn.addEventListener('click', openCartDrawer);
        closeCart.addEventListener('click', closeCartDrawer);
        overlay.addEventListener('click', closeCartDrawer);

        // Add to Cart
        function addToCartArray(id, name, price) {
            const existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ id, name, price, quantity: 1 });
            }
            updateCartUI();
        }

        // Remove item from UI
        function removeCartItem(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        // Dynamic Cart updates & Dynamic Link generation
        function updateCartUI() {
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            if (totalCount > 0) {
                cartCountBadge.innerText = totalCount;
                cartCountBadge.style.display = 'flex';
                emptyMessage.style.display = 'none';
                telegramLink.style.display = 'block'; 
            } else {
                cartCountBadge.style.display = 'none';
                emptyMessage.style.display = 'block';
                telegramLink.style.display = 'none';  
            }

            // Reset Item rows
            cartItemsList.querySelectorAll('.cart-item').forEach(el => el.remove());

            let totalSum = 0;
            let orderMessage = `🔔 *New Order from BRKTshop* 🔔\n\n`;

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                totalSum += itemTotal;

                // Add to visible cart drawer list
                const itemRow = document.createElement('div');
                itemRow.className = 'cart-item';
                itemRow.innerHTML = `
                    <div class="item-details">
                        <h4>${item.name}</h4>
                        <p>Br${item.price.toLocaleString()}.00 ETB x ${item.quantity}</p>
                    </div>
                    <button class="remove-item" onclick="removeCartItem('${item.id}')">Remove</button>
                `;
                cartItemsList.appendChild(itemRow);

                // Build text message line
                orderMessage += `▪️ ${item.name.trim()} (x${item.quantity}) - Br${itemTotal.toLocaleString()}.00 ETB\n`;
            });

            const totalTextString = `Br${totalSum.toLocaleString()}.00 ETB`;
            cartTotalSum.innerText = totalTextString;

            orderMessage += `\n💰 *Total:* Br${totalSum.toLocaleString()}.00 ETB`;

            // Update the <a> anchor element instantly & explicitly with formatted message parameters
            const finalUrl = `https://t.me/${TELEGRAM_USERNAME}?text=${encodeURIComponent(orderMessage)}`;
            telegramLink.setAttribute('href', finalUrl);
        }

        // Utilities Global Actions
        document.getElementById('searchBtn').addEventListener('click', () => {
            const query = prompt("What flavor or product are you searching for?");
            if(query) alert(`Searching store listings for: "${query}"`);
        });
        document.getElementById('profileBtn').addEventListener('click', () => {
            alert("Customer account access is disabled on this demo profile.");
        });

        // Initialize App View Layout
        renderCatalog();
    </script>
</body>
</html>
